version: "3.9"

services:
  context-annotation-app:
    image: node:18-alpine
    container_name: context-annotation-app
    working_dir: /app
    command: ["npm", "start"]
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
    environment:
      NODE_ENV: production
    env_file:
      - .env
    restart: unless-stopped

    # GitHub checkout method
    # Portainer will pull the repo automatically
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "512M"
