version: "3.9"

services:
  contextannotationapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "${HOST_PORT:-3000}:443"   # external:internal → HTTPS served on ${HOST_PORT} - default 3000 - externally
    volumes:
      - /home/docker/certs:/certs:ro
    restart: unless-stopped
    
# OPTIONAL network – only used if env var is provided
    networks:
      - ${SUPABASE_NETWORK:-default}

# OPTIONAL definition
networks:
  supabase_default:
    external: true
  default:
    driver: bridge

