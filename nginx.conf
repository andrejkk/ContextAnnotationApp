# HTTPS server running INSIDE the container on port 443
server {
    listen 443 ssl http2;
    server_name docker-alpine.lucami.org;

    ssl_certificate     /certs/docker-alpine.lucami.org/fullchain.pem;
    ssl_certificate_key /certs/docker-alpine.lucami.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # Path where Vite build artifacts are served
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for Vite
    location / {
        try_files $uri /index.html;
    }
}
